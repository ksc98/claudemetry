name = "cc-proxy"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-01"
workers_dev = false
preview_urls = false

# __DOMAIN__ is substituted at deploy time from $DOMAIN (see justfile)
# so the public repo stays deployment-agnostic. The proxy takes /v1/*
# and /_cm/*; the dashboard worker binds the rest of the hostname.
routes = [
  { pattern = "__DOMAIN__/v1/*", zone_name = "__DOMAIN__" },
  { pattern = "__DOMAIN__/_cm/*", zone_name = "__DOMAIN__" },
]

# One Durable Object instance per user_hash. Each instance gets its own
# private SQLite database (via `state.storage().sql()`). No provisioning —
# the first request with a given name materializes the DO + its DB.
[[durable_objects.bindings]]
name = "USER_STORE"
class_name = "UserStore"

# SQLite-backed DOs require `new_sqlite_classes` (not `new_classes`).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserStore"]

# Workers AI: used for embedding turn text (bge-base-en-v1.5, 768 dims).
[ai]
binding = "AI"

# Vectorize: shared semantic index. Per-user isolation is a Vectorize
# `namespace` (namespace=<user_hash>) on every upsert/query — hard partition,
# not a metadata filter. The id prefix (`{user_hash}:{tx_id}`) remains as a
# uniqueness guard within the index. Provision once: `just vectorize-create`.
[[vectorize]]
binding = "VECTORIZE"
index_name = "claudemetry-turns"

# Shared with the dashboard worker. Keys are namespaced by prefix:
#   tok:<token_id>     bearer → "{uuid}|{email}", TTL 1h (auth cache)
#   link:<email>       CF Access email → user_hash (dashboard scoping)
[[kv_namespaces]]
binding = "SESSION"
id = "0217e705fa5f4ce7843f7ce7cbcf4f10"

[build]
command = "cargo install -q \"worker-build@^0.8\" && worker-build --release"

# Cloudflare caps cpu_ms at 300000 (5 min) for fetch handlers on the paid plan.
# This is the highest value allowed; 15 min isn't supported for fetch handlers.
[limits]
cpu_ms = 300000

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

[dev]
port = 8787
